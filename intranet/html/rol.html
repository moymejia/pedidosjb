<h4 class="card-title m-b-5 header-titulo">Roles de usuario</h4>
<form class="margen-formulario" onsubmit="
	delete callback_guardar_registro_correcto;
	callback_guardar_registro_correcto = function(){
		return mostrar_opcion(2,'Roles de usuario','Seguridad');
	};
	guardar_registro(this);
	return false;
	" id="formulario_registro">
	<input type="hidden" name="idrol" id="idrol">
	<input type="hidden" name="table" id="table" value="rol">
	<div class="row">
		<div class="form-group m-b-5 col-md-4">
			<input type="text" class="form-control" id="nombre" name="nombre" required>
			<span class="bar"></span>
			<label for="nombre">Descripicion del rol</label>
        </div>
        <div class="form-group m-b-5 col-md-4">
			<input type="text" class="form-control" id="estado" name="estado" value="ACTIVO" readonly>
			<span class="bar"></span>
			<label for="estado">Estado</label>
		</div>
        <div class="form-group m-b-5 col-md-4">
			<button type="submit" class="btn btn-success waves-effect waves-light m-r-10" onclick="">Guardar</button>
			<button type="reset" class="btn btn-inverse waves-effect waves-light" onclick="objeto('botones_edicion').style.display = 'none';objeto('idrol').value = '';">Cancelar</button>
			<span id="botones_edicion" style="display: none;">
				<button type="button" class="btn btn-info waves-effect waves-light" onclick="
					delete callback_download;
					callback_download = function(){
						if(objeto('estado').value == 'PROTEGIDO') notify_warning('Registro protegido, no puede modificarse');
						if(objeto('estado').value != 'PROTEGIDO'){ 
							notify_success('El rol esta ahora '+objeto('estado').value);
							return mostrar_opcion(2,'Roles de usuario','Seguridad');
						}
					}
					download_input_value('idrol','rol','cambiar_estado','estado');
					">Cambiar estado</button>
			</span>
		</div>
	</div>
</form>

<hr>
<h4 class="card-title m-b-5">Roles de usuario actuales</h4>

	<table id="tabla_datos" class="display nowrap table table-hover table-bordered datatable" cellspacing="0" width="100%">
		<thead>
			<tr>
				<th>Acciones</th>
				<th>Id.</th>
				<th>Rol</th>
				<th>Estado</th>
			</tr>
		</thead>
		<tbody>
			[tabla_roles]
		</tbody>
	</table>
</div>
