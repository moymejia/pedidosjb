<input type="hidden" id="datatableid" name="datatableid" value="tabla_clientes">
<div id="div_tabs" style="display: none;">
    <div class="row">
        <div class="col-md-12">
            <div class="card">

                <ul class="nav nav-tabs" role="tablist">
                    <li class="nav-item" id="tab_clientes">
                        <a class="nav-link active" data-toggle="tab" id="a_mantenimiento" href="#mantenimiento_tab" role="tab">Cliente</a>
                    </li>
                    <li class="nav-item" id="tab_contactos">
                        <a class="nav-link" data-toggle="tab" id="a_contactos" href="#contactos_tab" role="tab">Contactos</a>
                    </li>
                </ul>

				<div class="tab-content">

					<div class="tab-pane active" id="mantenimiento_tab" role="tabpanel">
						<form class="margen-formulario" onsubmit="
							delete callback_guardar_registro_correcto;
							callback_guardar_registro_correcto = function(){
								return mostrar_opcion(8,'Cliente','Clientes');
							};
							guardar_registro(this);
							return false;
							" id="formulario_registro">

							<input type="hidden" name="table" id="table" value="cliente">
							<input type="hidden" name="idcliente" id="idcliente">

							<div class="row">
								<div class="form-group m-b-5 col-md-2">
									<label for="codigo">Codigo:</label>
									<input type="text" class="form-control" id="codigo" name="codigo" required>
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-4">
									<label for="nombre">Nombre:</label>
									<input type="text" class="form-control" id="nombre" name="nombre" required>
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-6">
									<label for="establecimiento">Establecimiento:</label>
									<input type="text" class="form-control" id="establecimiento" name="establecimiento">
									<span class="bar"></span>
								</div>

							</div>
							<div class="row">
								<div class="form-group m-b-5 col-md-6">
									<label for="direccion">Direccion:</label>
									<input type="text" class="form-control" id="direccion" name="direccion">
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-3">
									<label for="telefono">Telefono:</label>
									<input type="text" class="form-control" id="telefono" name="telefono">
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-3">
									<label for="nit">NIT:</label>
									<input type="text" class="form-control" id="nit" name="nit" required>
									<span class="bar"></span>
								</div>
							</div>
							<div class="row">
								<div class="form-group m-b-5 col-md-12">
									<label for="observaciones">observaciones</label>
									<input type="text" class="form-control" id="observaciones" name="observaciones">
									<span class="bar"></span>
								</div>
							</div>
							<div class="row">
								<div class="form-group col-md-3">
									<label for="limite_credito">Limite de credito:</label>
									<input type="number" step="0.01" min="0" class="form-control" id="limite_credito" name="limite_credito"
										required>
									<span class="bar"></span>
								</div>
								<div class="form-group col-md-3">
									<label for="dias_credito">Dias de credito:</label>
									<input type="number" min="0" class="form-control" id="dias_credito" name="dias_credito" required>
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-3">
									<label for="correo">Correo:</label>
									<input type="email" class="form-control" id="correo" name="correo">
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-3">
									<label for="estado">Estado:</label>
									<input type="text" class="form-control" id="estado" name="estado" value="ACTIVO" readonly>
									<span class="bar"></span>
								</div>
							</div>
							<div class="row">
								<div class="form-group col-md-12 m-t-30">
									<button type="submit" class="btn btn-success waves-effect waves-light m-r-10" onclick="">Guardar</button>
									<button type="reset" class="btn btn-inverse waves-effect waves-light m-r-10" onclick="
											showElements('div_tabla');
											hideElements('div_tabs')
										">
									Cancelar</button>

									<span id="botones_edicion" style="display: none;">
										<button type="button" class="btn btn-info waves-effect waves-light" onclick="
											delete callback_download;
											callback_download = function(){
												if(objeto('estado').value == 'PROTEGIDO') notify_warning('Registro protegido, no puede modificarse');
												if(objeto('estado').value != 'PROTEGIDO'){ 
													notify_success('El cliente esta ahora '+objeto('estado').value);
													return mostrar_opcion(8,'Cliente','Clientes');
												}
											}
											download_input_value('idcliente','cliente','cambiar_estado','estado');
											">Cambiar estado</button>
									</span>
								</div>
							</div>
						</form>
					</div>

					<div class="tab-pane" id="contactos_tab" role="tabpanel">
						<form class="margen-formulario" id="formulario_registro_contacots">

							<input type="hidden" name="table" id="table" value="cliente_contacto">
							<input type="hidden" name="idcliente_contacto" id="idcliente_contacto">

							<div class="row">
								<div class="form-group col-md-4">
									<label>Tipo contacto</label>
									<select class="form-control" id="idtipo_contacto" name="idtipo_contacto">
										[tipo_contacto]
									</select>
								</div>
								<div class="form-group m-b-5 col-md-4">
									<label for="nombre_contacto">Nombre:</label>
									<input type="text" class="form-control" id="nombre_contacto" name="nombre_contacto" required>
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-4">
									<label for="telefono_contacto">Teléfono:</label>
									<input type="text" class="form-control" id="telefono_contacto" name="telefono_contacto">
									<span class="bar"></span>
								</div>
							</div>

							<div class="row">
								
								<div class="form-group m-b-5 col-md-4">
									<label for="correo_contacto">Correo:</label>
									<input type="email" class="form-control" id="correo_contacto" name="correo_contacto">
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-4">
									<label for="observaciones_contacto">Observaciones:</label>
									<input type="text" class="form-control" id="observaciones_contacto" name="observaciones_contacto">
									<span class="bar"></span>
								</div>
								<div class="form-group m-b-5 col-md-4">
									<label for="estado_contacto">Estado:</label>
									<input type="text" class="form-control" id="estado_contacto" name="estado_contacto" value="ACTIVO" readonly>
									<span class="bar"></span>
								</div>
							</div>
							<div class="row">
								<div class="form-group col-md-3 m-t-30">
									<button type="button" class="btn btn-success waves-effect waves-light m-r-10" onclick="
										
										callback_guardar_contacto = function(){
											notify_success('Contacto guardado correctamente.')
											download_div_content('idcliente','cliente_contacto','tabla_contactos','div_tabla_cliente_contactos');
										}
										upload_action('idcliente,idcliente_contacto,idtipo_contacto,nombre_contacto,telefono_contacto,correo_contacto,estado_contacto,observaciones_contacto','cliente_contacto','guardar',callback_guardar_contacto);
										">
										Guardar
									</button>

									<button type="reset" class="btn btn-inverse waves-effect waves-light m-r-10"
										onclick="hideElement('botones_edicion_contacto');objeto('idcliente_contacto').value = '';objeto('idcliente_contacto').readOnly = false;">
										Cancelar
									</button>

									<span id="botones_edicion_contacto" style="display: none;">
										<button type="button" class="btn btn-info waves-effect waves-light" onclick="
											delete callback_download;
											callback_download = function(){
												if(objeto('estado_contacto').value == 'PROTEGIDO') notify_warning('Registro protegido, no puede modificarse');
												if(objeto('estado_contacto').value != 'PROTEGIDO'){ 
													notify_success('El contacto ahora está '+objeto('estado_contacto').value);
													clearElements('idcliente_contacto,idtipo_contacto,nombre_contacto,telefono_contacto,correo_contacto,estado_contacto,observaciones_contacto')
													download_div_content('idcliente','cliente_contacto','tabla_contactos','div_tabla_cliente_contactos');
												}
											}
											download_input_value('idcliente_contacto','cliente_contacto','cambiar_estado','estado_contacto');
										">
											Cambiar estado
										</button>
									</span>
								</div>
							</div>

							<div id="div_tabla_cliente_contactos">
								
							</div>

						</form>

					</div>
				</div>

			</div>
		</div>		
	</div>
</div>


<div id="div_tabla">
    <button type="button" class="btn btn-primary" onclick="
        clearElements('formulario_registro,idcliente');
        hideElements('tab_contactos,div_tabla');
        showElements('div_tabs,tab_clientes');
        $('#a_mantenimiento').tab('show');
    ">
        <span class="btn-label">
            <i class="fas fa-plus"></i>
        </span>Nuevo
    </button>

    <div class="table-responsive" id="lista_clientes">
        [tabla_clientes]
    </div>
</div>
