<h4 class="card-title m-b-5 header-titulo">Ventas por temporada</h4>
<form class="margen-formulario" id="formulario_reporte">

    <input type="hidden" id="jsid" name="jsid" value="ventas_temporada">
    <input type="hidden" id="idpedido_cargar" name="idpedido_cargar">
    <input type="hidden" id="idtemporada_cargar" name="idtemporada_cargar">
    <input type="hidden" id="idcliente_cargar" name="idcliente_cargar">
    <input type="hidden" id="idmarca_cargar" name="idmarca_cargar">

    <div class="row">
        <div class="form-group m-b-5 col-md-3">
            <label for="idtemporada">Temporada</label>
            <select class="form-control " id="idtemporada" name="idtemporada" required onchange="cambio_temporada();">
                [temporadas_activas]
            </select>
            <span class="bar"></span>
        </div>
        <div class="form-group m-b-5 col-md-3">
            <label for="idcliente">Cliente</label>
            <select class="form-control select2" id="idcliente" name="idcliente" onchange="cargarMarcas();" value="">
                [clientes_activos]
            </select>
            <span class="bar"></span>
        </div>
        <div class="form-group m-b-5 col-md-3">
            <label for="idmarca">Marca</label>
            <select class="form-control " id="idmarca" name="idmarca" onchange="cargarClientes();">
                [marcas_activas]
            </select>
            <span class="bar"></span>
        </div>
        <div class="form-group col-md-3 m-t-30">
            <button type="button" id="generar_reporte" class="btn btn-success waves-effect waves-light m-r-10" onclick="
                callback_reporte = function () {
                    showElement('lista_ventas_temporada');
                };
                download_div_content('idtemporada,idcliente,idmarca', 'ventas_temporada', 'reporte_ventas_temporada', 'lista_ventas_temporada', callback_reporte);
                ">Generar reporte</button>
            <button type="reset" class="btn btn-inverse waves-effect waves-light m-r-10"
                onclick="
                    mostrar_opcion(52,'Ventas por temporada','Reportes de ventas');
                ">Limpiar</button>
        </div>
    </div>
</form>
<hr>
<!-- -->
<div class="table-responsive" id="lista_ventas_temporada" style="display: none;">
</div>
