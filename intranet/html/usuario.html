<h4 class="card-title m-b-5 header-titulo">Mantenimiento de usuarios</h4>
<form class="margen-formulario" onsubmit="
	delete callback_guardar_registro_correcto;
	callback_guardar_registro_correcto = function(){
		return mostrar_opcion(1,'Usuario','Seguridad');
	};
	guardar_registro(this);
	return false;
	" id="formulario_registro">
	<input type="hidden" name="table" id="table" value="usuario">
	<div class="row">
		<div class="form-group m-b-5 col-md-4">
			<label for="usuario">Usuario</label>
			<input type="text" class="form-control" id="usuario" name="usuario" required>
			<span class="bar"></span>
		</div>
		<div class="form-group m-b-5 col-md-4">
			<label for="clave">Clave:</label>
			<input type="password" class="form-control" id="clave" name="clave" >
			<span class="bar"></span>
		</div>
		<div class="form-group m-b-5 col-md-4">
			<label for="nombre">Nombre</label>
			<input type="text" class="form-control" id="nombre" name="nombre" required>
			<span class="bar"></span>
		</div>
	</div>
    <div class="row">
        <div class="form-group col-md-4">
			<label for="email">Email</label>
			<input type="mail" class="form-control" id="email" name="email" >
			<span class="bar"></span>
		</div>
		<div class="form-group m-b-5 col-md-4">
			<label for="idrol">Rol de usuario</label>
			<select class="form-control " id="idrol" name="idrol" >
				[roles_activos]
			</select>
			<span class="bar"></span>
		</div>
		<div class="form-group m-b-5 col-md-2">
			<label for="color">Color</label>
			<input type="color" class="form-control" id="color" name="color" >
			<span class="bar"></span>
		</div>
		<div class="form-group m-b-5 col-md-2">
			<label for="pin">Pin de venta</label>
			<input type="text" class="form-control" id="pin" name="pin" min="0" max="9999" step="1">
			<span class="bar"></span>
		</div>
    </div>
    <div class="row">
		<div class="form-group m-b-5 col-md-4">
			<input type="text" class="form-control" id="estado" name="estado" value="ACTIVO" readonly>
			<span class="bar"></span>
			<label for="estado">Estado</label>
		</div>
		<div class="form-group col-md-8">
			<button type="submit" class="btn btn-success waves-effect waves-light m-r-10" onclick="">Guardar</button>
			<button type="reset" class="btn btn-inverse waves-effect waves-light" onclick="objeto('botones_edicion').style.display = 'none';objeto('usuario').value = '';objeto('usuario').readOnly = false;">Cancelar</button>
			<span id="botones_edicion" style="display: none;">
				<button type="button" class="btn btn-info waves-effect waves-light" onclick="
					delete callback_download;
					callback_download = function(){
						if(objeto('estado').value == 'PROTEGIDO') notify_warning('Registro protegido, no puede modificarse');
						if(objeto('estado').value != 'PROTEGIDO'){ 
							notify_success('El usuario esta ahora '+objeto('estado').value);
							return mostrar_opcion(1,'Usuario','Seguridad');
						}
					}
					download_input_value('usuario','usuario','cambiar_estado','estado');
					">Cambiar estado</button>
					
					<button type="button" class="btn btn-warning waves-effect waves-light" onclick="
					delete callback_upload;
					callback_upload = function(){
                        notify_success('Clave de acceso modificada correctamente');
					}
					upload_action('usuario,clave','usuario','cambiar_clave');
					">Cambiar Clave</button>
			</span>
		</div>
    </div>
</form>
<hr>
<!-- -->
<div class="table-responsive"  id="lista_usuarios">
			[tabla_usuarios]		
</div>
	<button class="btn btn-sm btn-info waves-effect waves-light" type="button" onclick="	
	callback_recargar_tabla_productos = function(){
		activar_tabla('tabla_datos');
	}
	download_div_content('usuario','usuario','tabla_todos_usuarios','lista_usuarios', callback_recargar_tabla_productos);
	goTop();
">Mostrar usuarios inactivos</button>
