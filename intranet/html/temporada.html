<h4 class="card-title m-b-5 header-titulo">Mantenimiento Temporadas</h4>
<form class="margen-formulario" onsubmit="
	delete callback_guardar_registro_correcto;
	callback_guardar_registro_correcto = function(){
		return mostrar_opcion(40,'pedidos','temporada');
	};
	guardar_registro(this);
	return false;
	" id="formulario_registro">

    <input type="hidden" name="table" id="table" value="temporada">
    <input type="hidden" name="idtemporada" id="idtemporada">

    <div class="row">
        <div class="form-group m-b-5 col-md-12">
            <label for="nombre">Nombre:</label>
            <input type="text" class="form-control" id="nombre" name="nombre" required>
            <span class="bar"></span>
        </div>
    </div>
    <div class="row">
        <div class="form-group m-b-5 col-md-3">
            <label for="fecha_inicio">Fecha de inicio:</label>
            <input type="date" class="form-control" id="fecha_inicio" name="fecha_inicio" required>
            <span class="bar"></span>
        </div>
        <div class="form-group m-b-5 col-md-3">
            <label for="fecha_fin">Fecha de final:</label>
            <input type="date" class="form-control" id="fecha_fin" name="fecha_fin">
            <span class="bar"></span>
        </div>
        <div class="form-group m-b-5 col-md-3">
            <label for="estado">Estado:</label>
            <input type="text" class="form-control" id="estado" name="estado" value="ACTIVO" readonly>
            <span class="bar"></span>
        </div>
        <div class="form-group col-md-3 m-t-30">
            <button type="submit" class="btn btn-success waves-effect waves-light m-r-10" onclick="">Guardar</button>
            <button type="reset" class="btn btn-inverse waves-effect waves-light m-r-10"
                onclick="objeto('botones_edicion').style.display = 'none';objeto('idtemporada').value = '';objeto('idtemporada').readOnly = false;">Cancelar</button>
            <span id="botones_edicion" style="display: none;">
                <button type="button" class="btn btn-info waves-effect waves-light m-t-10" onclick="
					delete callback_download;
					callback_download = function(){
						if(objeto('estado').value == 'PROTEGIDO') notify_warning('Registro protegido, no puede modificarse');
						if(objeto('estado').value != 'PROTEGIDO'){ 
							notify_success('La temporada esta ahora '+objeto('estado').value);
							return mostrar_opcion(40,'pedidos','temporada');
						}
					}
					download_input_value('idtemporada','temporada','cambiar_estado','estado');
					">Cambiar estado</button>
            </span>
        </div>
    </div>
</form>
<hr>
<!-- -->
<div class="table-responsive" id="lista_temporada">
    [tabla_temporada]
</div>
